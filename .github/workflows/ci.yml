name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Host unit tests + firmware compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run host-side unit tests
        working-directory: firmware/arp
        run: |
          if [ -d test ] && grep -q '\[env:native\]' platformio.ini; then
            pio test -e native
          else
            echo "No native test env yet — skipping (vacuous pass)"
          fi

      - name: Compile firmware (compile-check only, no upload)
        working-directory: firmware/arp
        run: pio run
