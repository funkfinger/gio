; clock-mod2: minimal clock-source firmware for a HAGIWO MOD2 (XIAO RP2350).
; Shares the same toolchain as the gio arp firmware. Reuses gio's lib/tempo/.

[platformio]
default_envs = seeed-xiao-rp2350

[env:seeed-xiao-rp2350]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico @ https://github.com/earlephilhower/arduino-pico.git#4.4.0
board = seeed_xiao_rp2350
framework = arduino
monitor_speed = 115200

; Reuse the tempo helper from the arp firmware — single source of truth for
; potToBpm() / bpmToStepMs(). No copy-paste of the logic.
lib_extra_dirs = ../arp/lib
