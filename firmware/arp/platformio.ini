; PlatformIO project for the gio arp firmware.
; See docs/decisions.md §2 (toolchain) and docs/stories/ for the roadmap.

[platformio]
default_envs = seeed-xiao-rp2350

[env:seeed-xiao-rp2350]
platform = https://github.com/earlephilhower/arduino-pico.git
board = seeed_xiao_rp2350
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit NeoPixel
    paulstoffregen/Encoder
; On-device tests deferred; pure-logic modules tested on host via [env:native]
test_ignore = *

[env:native]
platform = native
test_framework = googletest
build_flags = -std=c++17 -Wall -Wextra
