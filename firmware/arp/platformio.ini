; PlatformIO project for the gio arp firmware.
; See docs/decisions.md §2 (toolchain) and docs/stories/ for the roadmap.

[platformio]
default_envs = seeed-xiao-rp2350

[env:seeed-xiao-rp2350]
; Platform is pinned to a tagged release (not `main`) so CI and local builds
; stay reproducible. The pinned version MUST support per-pin `analogWriteFreq(pin, freq)`
; — see decisions.md §11 and Story 003. Update intentionally; verify PWM DAC still
; bench-correct after any platform bump.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico @ https://github.com/earlephilhower/arduino-pico.git#4.4.0
board = seeed_xiao_rp2350
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit NeoPixel
    ; paulstoffregen/Encoder is AVR-only — incompatible with RP2350. Replace in Story 007.
; On-device tests deferred; pure-logic modules tested on host via [env:native]
test_ignore = *

[env:native]
platform = native
test_framework = googletest
build_flags = -std=c++17 -Wall -Wextra
