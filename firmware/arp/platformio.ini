; PlatformIO project for the gio arp firmware.
; See docs/decisions.md §2 (toolchain) and docs/stories/ for the roadmap.

[platformio]
default_envs = seeed-xiao-rp2350

[env:seeed-xiao-rp2350]
; Platform is pinned to a tagged release (not `main`) so CI and local builds
; stay reproducible. The pinned version MUST support per-pin `analogWriteFreq(pin, freq)`
; — see decisions.md §11 and Story 003. Update intentionally; verify PWM DAC still
; bench-correct after any platform bump.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico @ https://github.com/earlephilhower/arduino-pico.git#4.4.0
board = seeed_xiao_rp2350
framework = arduino
monitor_speed = 115200
; Exclude the smoke-test entrypoint from the production build — it has its
; own setup()/loop() that would collide with main.cpp at link time.
build_src_filter = +<*> -<main_smoketest.cpp>
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit NeoPixel
    ; paulstoffregen/Encoder removed during Story 002 (AVR-only). Replaced with
    ; mathertel/RotaryEncoder in Story 007 — RP2350-compatible, polling-based.
    mathertel/RotaryEncoder
    ; Story 012 platform pivot — SPI DAC + ADC. Both Rob Tillaart libs (MIT).
    robtillaart/DAC8552
    robtillaart/MCP_ADC
; On-device tests deferred; pure-logic modules tested on host via [env:native]
test_ignore = *

; Smoke-test build: swaps src/main.cpp for src/main_smoketest.cpp via build_src_filter.
; Use this env to validate Story 012 SPI bring-up + outputs/inputs HAL on the bench
; without disturbing the production arp firmware. Run:
;     pio run -d firmware/arp -e seeed-xiao-rp2350-smoketest --target upload
;     pio device monitor -d firmware/arp -e seeed-xiao-rp2350-smoketest
[env:seeed-xiao-rp2350-smoketest]
extends = env:seeed-xiao-rp2350
build_src_filter = +<*> -<main.cpp> +<main_smoketest.cpp>
build_flags = -DGIO_SMOKE_TEST

[env:native]
platform = native
test_framework = googletest
build_flags = -std=c++17 -Wall -Wextra
